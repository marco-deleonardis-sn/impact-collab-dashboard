<style>
/* ── SN Brand tokens ─────────────────────────── */
:root {
  --blue:    #032D42;
  --teal:    #044355;
  --green:   #63DF4E;
  --sage:    #81B5A1;
  --surface: #F7F9FB;
  --white:   #FFFFFF;
  --border:  #D8DDE6;
  --text:    #1B2B38;
  --muted:   #546E7A;
  --info:    #0176D3;
  --warn:    #DD7A01;
  --error:   #C23934;
  --success: #3BA755;
  --notion:  #E07B54;
  --enh:     #5A31F4;
  --shadow:  0 1px 4px rgba(3,45,66,.1);
  --shadow-md: 0 2px 12px rgba(3,45,66,.12);
}
* { box-sizing:border-box; margin:0; padding:0 }
body { background:var(--surface); color:var(--text); font-family:'Segoe UI',Calibri,sans-serif; font-size:13px; line-height:1.5 }

/* ── Layout ─────────────────────────────────── */
#app { display:flex; flex-direction:column; min-height:100vh }

/* ── Header ─────────────────────────────────── */
.header {
  background:var(--blue); color:#fff;
  height:56px; padding:0 24px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:300;
  box-shadow:0 2px 8px rgba(3,45,66,.3);
}
.header-brand { display:flex; align-items:center; gap:12px }
.header-logo {
  width:34px; height:34px; border-radius:7px;
  background:var(--green); color:var(--blue);
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:12px; letter-spacing:-.5px; flex-shrink:0;
}
.header-title { font-size:14px; font-weight:600 }
.header-sub   { font-size:11px; color:rgba(255,255,255,.55); margin-top:1px }
.header-pills { display:flex; gap:8px; align-items:center }
.pill {
  display:flex; align-items:center; gap:5px;
  padding:3px 10px; border-radius:20px;
  border:1px solid rgba(255,255,255,.2);
  font-size:10px; color:rgba(255,255,255,.8);
}
.pill-dot { width:6px; height:6px; border-radius:50%; background:var(--green) }
.pulse { animation:pulse 2s ease-in-out infinite }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── Summary strip ───────────────────────────── */
.summary-strip {
  background:var(--blue);
  border-top:1px solid rgba(255,255,255,.08);
  padding:8px 24px;
  display:flex; gap:20px; flex-wrap:wrap;
}
.sum-card { text-align:center; min-width:64px }
.sum-num  { font-size:20px; font-weight:700; line-height:1.1 }
.sum-lbl  { font-size:9px; color:rgba(255,255,255,.5); text-transform:uppercase; letter-spacing:.07em; margin-top:2px }

/* ── Tabs ────────────────────────────────────── */
.tabs {
  background:var(--blue);
  border-top:1px solid rgba(255,255,255,.08);
  padding:0 24px; display:flex; gap:2px;
  position:sticky; top:56px; z-index:200;
}
.tab-btn {
  padding:9px 16px; font-size:12px; font-weight:500;
  color:rgba(255,255,255,.55); cursor:pointer;
  background:none; border:none; border-bottom:2px solid transparent;
  transition:all .15s; font-family:inherit;
}
.tab-btn:hover { color:#fff }
.tab-btn.active { color:var(--green); border-bottom-color:var(--green) }
.tab-badge {
  display:inline-block; background:rgba(255,255,255,.12);
  border-radius:10px; padding:0 6px; font-size:10px;
  margin-left:4px; font-family:'Courier New',monospace;
}

/* ── Main ────────────────────────────────────── */
main { max-width:1440px; margin:0 auto; padding:20px 24px 80px; flex:1 }

/* ── Filter bar ──────────────────────────────── */
.filter-bar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center }
.search-input {
  flex:1; min-width:200px; padding:7px 12px;
  border:1px solid var(--border); border-radius:4px;
  font-size:12px; font-family:inherit; background:var(--white);
}
.search-input:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 2px rgba(3,45,66,.1) }
.fbtn {
  padding:6px 12px; border:1px solid var(--border); border-radius:4px;
  font-size:11px; cursor:pointer; background:var(--white);
  color:var(--muted); transition:all .15s; font-family:inherit;
}
.fbtn:hover { border-color:var(--blue); color:var(--blue) }
.fbtn.active { background:var(--blue); color:#fff; border-color:var(--blue) }

/* ── Task card ───────────────────────────────── */
.task-card {
  background:var(--white); border:1px solid var(--border);
  border-radius:6px; overflow:hidden;
  box-shadow:var(--shadow); margin-bottom:8px;
  transition:box-shadow .15s;
}
.task-card:hover { box-shadow:var(--shadow-md) }
.card-header {
  display:flex; align-items:stretch; cursor:pointer; min-height:48px;
}
.card-accent { width:4px; flex-shrink:0 }
.card-inner {
  flex:1; padding:9px 14px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.card-left  { display:flex; align-items:center; gap:10px; flex:1; min-width:0 }
.card-num   { font-size:11px; font-weight:600; color:var(--muted); font-family:'Courier New',monospace; white-space:nowrap }
.card-title { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.card-right { display:flex; align-items:center; gap:5px; flex-shrink:0 }
.chevron    { font-size:11px; color:var(--muted); transition:transform .15s; margin-left:2px }
.task-card.open .chevron { transform:rotate(180deg) }

/* ── Badges ─────────────────────────────────── */
.badge {
  display:inline-flex; align-items:center;
  padding:2px 7px; border-radius:3px;
  font-size:10px; font-weight:600; white-space:nowrap;
}

/* ── Card body / inner tabs ──────────────────── */
.card-body    { display:none; border-top:1px solid var(--border) }
.task-card.open .card-body { display:block }
.inner-tabs   { display:flex; background:var(--surface); border-bottom:1px solid var(--border) }
.itab {
  padding:7px 14px; font-size:11px; font-weight:500;
  cursor:pointer; background:none; border:none;
  border-bottom:2px solid transparent; color:var(--muted);
  transition:all .15s; font-family:inherit;
}
.itab:hover { color:var(--teal) }
.itab.active { color:var(--blue); border-bottom-color:var(--blue); background:var(--white) }
.ipanel { display:none; padding:14px 16px }
.ipanel.active { display:block }

/* ── Notion notes ────────────────────────────── */
.notes-list   { display:flex; flex-direction:column; gap:7px }
.note-item    { border:1px solid #F0E8E2; border-radius:4px; padding:9px 12px; background:#FFFAF7 }
.note-item.highlight { border-color:#FECACA; background:#FFF8F8 }
.note-hdr     { display:flex; align-items:center; gap:7px; margin-bottom:3px }
.note-dot     { width:8px; height:8px; border-radius:50%; background:var(--notion); flex-shrink:0 }
.note-dot.red { background:var(--error) }
.note-dtitle  { font-size:11px; font-weight:600; color:var(--notion) }
.note-dtitle.red { color:var(--error) }
.note-link    { font-size:10px; color:var(--muted); text-decoration:none; margin-left:auto }
.note-link:hover { color:var(--blue) }
.note-summary { font-size:12px; color:var(--teal); line-height:1.5 }
.note-date    { font-size:9px; color:var(--muted); margin-left:auto; flex-shrink:0 }
.no-notes     { font-size:12px; color:var(--muted); font-style:italic }

/* ── Work note editor ────────────────────────── */
.note-editor   { display:flex; flex-direction:column; gap:8px }
.note-textarea {
  width:100%; padding:10px 12px; border:1px solid var(--border);
  border-radius:4px; font-size:12px; font-family:inherit;
  resize:vertical; min-height:90px; color:var(--text); line-height:1.6;
}
.note-textarea:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 2px rgba(3,45,66,.1) }
.note-footer   { display:flex; justify-content:space-between; align-items:center }
.note-updated  { font-size:10px; color:var(--muted) }
.btn-row       { display:flex; gap:6px }

/* ── Buttons ─────────────────────────────────── */
.btn {
  padding:5px 12px; border-radius:4px; font-size:11px; font-weight:600;
  cursor:pointer; border:none; font-family:inherit; transition:all .15s; white-space:nowrap;
}
.btn-primary { background:var(--blue); color:#fff }
.btn-primary:hover { background:var(--teal) }
.btn-ghost   { background:transparent; color:var(--blue); border:1px solid var(--blue) }
.btn-ghost:hover { background:rgba(3,45,66,.06) }
.btn-success { background:var(--success); color:#fff }
.btn-sm      { font-size:10px; padding:4px 10px }
.qa-row      { display:flex; gap:6px; flex-wrap:wrap; padding:9px 16px; border-top:1px solid var(--border); background:var(--surface) }

/* ── Intel briefing cards ────────────────────── */
.intel-card {
  background:var(--white); border:1px solid var(--border);
  border-radius:6px; overflow:hidden; margin-bottom:10px;
  box-shadow:var(--shadow);
}
.intel-header {
  display:flex; align-items:center; gap:10px; padding:12px 16px;
  cursor:pointer; border-bottom:1px solid transparent;
}
.intel-card.open .intel-header { border-bottom-color:var(--border) }
.intel-accent { width:4px; align-self:stretch; flex-shrink:0; border-radius:2px 0 0 2px; margin-left:-16px; margin-right:10px }
.intel-title  { font-size:13px; font-weight:500; flex:1 }
.intel-meta   { display:flex; gap:5px; align-items:center; flex-shrink:0 }
.intel-body   { display:none; padding:14px 16px }
.intel-card.open .intel-body { display:block }
.intel-src    { font-size:10px; color:var(--muted); margin-bottom:8px; display:flex; align-items:center; gap:6px }
.intel-src a  { color:var(--notion); text-decoration:none }
.intel-src a:hover { text-decoration:underline }
.intel-text   { font-size:12px; color:var(--teal); line-height:1.65; white-space:pre-wrap }
.intel-tasks  { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px }

/* ── ENH table ───────────────────────────────── */
.fdbk-table { width:100%; border-collapse:collapse; font-size:12px }
.fdbk-table td { padding:6px 10px; border-bottom:1px solid var(--border) }
.fdbk-table tr:last-child td { border-bottom:none }
.fdbk-table td:first-child { font-weight:600; color:var(--muted); width:140px }

/* ── Section label ───────────────────────────── */
.section-sub { font-size:12px; color:var(--muted); margin-bottom:14px }

/* ── Compact card body ───────────────────────── */
.compact-body { padding:10px 16px; font-size:12px; color:var(--muted) }
</style>

<style>
/* ── Mobile overrides ──────────────────────────── */
@media (max-width: 768px) {
  .header           { padding: 0 14px; height: 52px }
  .header-sub       { display: none }
  .header-pills     { gap: 5px }
  .pill             { padding: 3px 7px; font-size: 9px }
  .summary-strip    { padding: 8px 14px; gap: 12px; overflow-x: auto; flex-wrap: nowrap }
  .sum-card         { min-width: 52px }
  .sum-num          { font-size: 17px }
  .tabs             { padding: 0 8px; overflow-x: auto; gap: 0 }
  .tab-btn          { padding: 10px 10px; font-size: 11px; white-space: nowrap }
  .tab-badge        { display: none }
  main              { padding: 12px 12px 100px }
  .filter-bar       { gap: 6px }
  .search-input     { font-size: 16px /* prevents iOS zoom */ }
  .fbtn             { padding: 8px 10px; font-size: 11px; min-height: 36px }
  .card-inner       { padding: 10px 10px }
  .card-num         { display: none }
  .card-title       { font-size: 12px }
  .badge            { font-size: 9px; padding: 2px 5px }
  .card-right       { gap: 4px }
  .itab             { padding: 9px 12px; font-size: 11px; min-height: 40px }
  .ipanel           { padding: 10px 12px }
  .note-item        { padding: 8px 10px }
  .note-summary     { font-size: 11px }
  .note-textarea    { font-size: 16px /* prevents iOS zoom */; min-height: 120px }
  .btn              { min-height: 36px; padding: 8px 12px }
  .btn-sm           { min-height: 32px; padding: 6px 10px }
  .qa-row           { padding: 8px 12px; gap: 6px }
  .intel-header     { padding: 10px 12px }
  .intel-title      { font-size: 12px }
  .intel-body       { padding: 10px 12px }
  .intel-text       { font-size: 11px }
  .fdbk-table td    { padding: 5px 8px; font-size: 11px }
  .fdbk-table td:first-child { min-width: 110px }
  .compact-body     { font-size: 11px; padding: 8px 12px }
  .section-sub      { font-size: 11px }
}

/* Smooth scrolling + tap highlight */
* { -webkit-tap-highlight-color: rgba(3,45,66,.08) }
html { scroll-behavior: smooth }

/* Sticky header height correction for iOS safe area */
@supports (padding-top: env(safe-area-inset-top)) {
  .header { padding-top: env(safe-area-inset-top) }
  .tabs   { top: calc(56px + env(safe-area-inset-top)) }
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useMemo, useCallback } = React;
const h = React.createElement;
const D = window.ICE_DATA;
const SN = 'https://attsncoteam.service-now.com';

// ── Helpers ──────────────────────────────────────────────────
const stateInfo = (s) => D.states[s] || D.states["1"];
const priInfo   = (p) => D.priorities[p] || D.priorities["4"];
const typeInfo  = (t) => D.types[t] || D.types["task"];
const noteInfo  = (ref) => D.notes[ref];
const notionURL = (id) => `https://www.notion.so/${id.replace(/-/g,'')}`;
const snURL     = (num) => `${SN}/u_impact_task_list.do?sysparm_query=number=${num}`;

function Badge({ label, color, bg, style }) {
  return h('span', { className:'badge', style:{ color, background: bg || '#F3F3F3', ...style } }, label);
}

// ── NoteItem ─────────────────────────────────────────────────
function NoteItem({ item }) {
  const note = noteInfo(item.ref);
  if (!note) return null;
  return h('div', { className:`note-item${item.highlight ? ' highlight' : ''}` },
    h('div', { className:'note-hdr' },
      h('span', { className:`note-dot${item.highlight ? ' red' : ''}` }),
      h('span', { className:`note-dtitle${item.highlight ? ' red' : ''}` }, note.title),
      h('span', { className:'note-date' }, note.date),
      h('a', { className:'note-link', href:notionURL(note.url), target:'_blank' }, 'Open ↗'),
    ),
    h('div', { className:'note-summary' }, item.summary),
  );
}

// ── WorkNote ─────────────────────────────────────────────────
function WorkNote({ task }) {
  const [text, setText]   = useState(task.workNote);
  const [saved, setSaved] = useState(false);

  const save = () => {
    navigator.clipboard.writeText(text).catch(() => {});
    window.open(snURL(task.number), '_blank');
    setSaved(true);
    setTimeout(() => setSaved(false), 2500);
  };

  return h('div', { className:'note-editor' },
    h('textarea', {
      className:'note-textarea', value:text,
      onChange: e => setText(e.target.value),
    }),
    h('div', { className:'note-footer' },
      h('span', { className:'note-updated' }, `Last SN update: ${task.updated}`),
      h('div', { className:'btn-row' },
        h('button', { className:'btn btn-ghost btn-sm', onClick:() => window.open(snURL(task.number),'_blank') }, 'Open in SN'),
        h('button', {
          className:`btn btn-sm ${saved ? 'btn-success' : 'btn-primary'}`,
          onClick:save,
        }, saved ? '✓ Copied & opened' : 'Save to SN'),
      ),
    ),
  );
}

// ── TaskCard ─────────────────────────────────────────────────
function TaskCard({ task }) {
  const [open,    setOpen]    = useState(false);
  const [activeTab, setTab]   = useState('notes');
  const state = stateInfo(task.state);
  const pri   = priInfo(task.priority);
  const type  = typeInfo(task.type);
  const hasNotes = task.notes && task.notes.length > 0;

  // Pick left-bar color: by state (WIP=teal, Open=info, Hold=warn) else priority
  const accentColor =
    task.state === '2'  ? '#044355' :
    task.state === '1'  ? '#0176D3' :
    task.state === '11' ? '#DD7A01' :
    task.state === '3'  ? '#3BA755' :
    pri.color;

  return h('div', { className:`task-card${open ? ' open' : ''}` },
    // ── header row ──
    h('div', { className:'card-header', onClick:() => setOpen(!open) },
      h('div', { className:'card-accent', style:{ background:accentColor } }),
      h('div', { className:'card-inner' },
        h('div', { className:'card-left' },
          h('span', { className:'card-num' }, task.number),
          h('span', { className:'card-title' }, task.title),
        ),
        h('div', { className:'card-right' },
          h(Badge, { label:state.label, color:state.color, bg:state.bg }),
          h(Badge, { label:pri.label,   color:pri.color,   bg:pri.bg   }),
          h(Badge, { label:type.label,  color:type.color,  bg:'#F0F4F8' }),
          hasNotes && h(Badge, { label:`${task.notes.length} Notes`, color:'#E07B54', bg:'#FEF0EA' }),
          task.fdbk && h(Badge, { label:task.fdbk, color:'#5A31F4', bg:'#F0F0FF' }),
          task.urgent && h(Badge, { label:'Urgent', color:'#C23934', bg:'#FDE9E9' }),
          h('span', { className:'chevron' }, '▾'),
        ),
      ),
    ),
    // ── body ──
    h('div', { className:'card-body' },
      hasNotes
        ? h('div', null,
            h('div', { className:'inner-tabs' },
              h('button', { className:`itab${activeTab==='notes'?' active':''}`, onClick:()=>setTab('notes') }, 'Notion Intel'),
              h('button', { className:`itab${activeTab==='note' ?' active':''}`, onClick:()=>setTab('note')  }, 'Work Note'),
            ),
            activeTab === 'notes'
              ? h('div', { className:'ipanel active' },
                  h('div', { className:'notes-list' },
                    task.notes.map((item, i) => h(NoteItem, { key:i, item })),
                  ),
                )
              : h('div', { className:'ipanel active' }, h(WorkNote, { task })),
          )
        : h('div', { className:'compact-body' },
            task.workNote
              ? h('p', null, task.workNote)
              : h('p', null, 'No additional context captured.'),
          ),
      h('div', { className:'qa-row' },
        h('button', { className:'btn btn-ghost btn-sm', onClick:() => window.open(snURL(task.number),'_blank') }, 'Open in SN'),
        task.dmnd && h('button', { className:'btn btn-ghost btn-sm' }, task.dmnd),
      ),
    ),
  );
}

// ── IntelCard ────────────────────────────────────────────────
function IntelCard({ b }) {
  const [open, setOpen] = useState(false);
  const note = noteInfo(b.source.note);

  return h('div', { className:`intel-card${open ? ' open' : ''}`, style:{ borderLeft:`4px solid ${b.accentColor}` } },
    h('div', { className:'intel-header', onClick:() => setOpen(!open) },
      h('div', { className:'intel-title' }, b.title),
      h('div', { className:'intel-meta' },
        h(Badge, { label:b.priority, color:b.priorityColor, bg:b.priorityColor+'22' }),
        h(Badge, { label:b.tasks.join(' · '), color:'#044355', bg:'#F3F3F3' }),
        h('span', { className:'chevron', style:{color:'#546E7A'} }, open ? '▴' : '▾'),
      ),
    ),
    h('div', { className:'intel-body' },
      h('div', { className:'intel-src' },
        h('span', null, `NOTION · ${b.source.date}`),
        note && h('a', { href:notionURL(note.url), target:'_blank' }, `${note.title} ↗`),
      ),
      h('pre', { className:'intel-text' }, b.body),
      h('div', { className:'intel-tasks' },
        b.tasks.map(t => h('button', { key:t, className:'btn btn-ghost btn-sm', onClick:()=>window.open(snURL(t),'_blank') }, `Update ${t}`)),
      ),
    ),
  );
}

// ── ENH Tab ──────────────────────────────────────────────────
function EnhTab() {
  const enhs = D.tasks.filter(t => t.type === 'ENH Request');
  return h('div', null,
    h('p', { className:'section-sub' }, `${enhs.length} active enhancement requests.`),
    enhs.map(task => {
      const state = stateInfo(task.state);
      const pri   = priInfo(task.priority);
      return h('div', { key:task.number, className:'task-card', style:{marginBottom:10} },
        h('div', { className:'card-header', style:{cursor:'default'} },
          h('div', { className:'card-accent', style:{ background:'#5A31F4' } }),
          h('div', { className:'card-inner' },
            h('div', { className:'card-left' },
              h('span', { className:'card-num' }, task.number),
              h('span', { className:'card-title' }, task.title),
            ),
            h('div', { className:'card-right' },
              h(Badge, { label:state.label, color:state.color, bg:state.bg }),
              h(Badge, { label:pri.label, color:pri.color, bg:pri.bg }),
              h(Badge, { label:'ENH', color:'#5A31F4', bg:'#F0F0FF' }),
              task.fdbk && h(Badge, { label:task.fdbk, color:'#5A31F4', bg:'#ECE9FF' }),
            ),
          ),
        ),
        h('div', { style:{ padding:'12px 16px' } },
          h('table', { className:'fdbk-table' },
            h('tbody', null,
              task.fdbk && h('tr', null, h('td',null,'FDBK'), h('td',null,task.fdbk)),
              task.dmnd && h('tr', null, h('td',null,'DMND'), h('td',null,task.dmnd)),
              h('tr', null, h('td',null,'State'), h('td', { style:{color:state.color} }, state.label)),
              h('tr', null, h('td',null,'Last updated'), h('td',null, task.updated)),
              task.notes.length > 0 && h('tr', null, h('td',null,'Latest Notion context'), h('td',null, task.notes[0].summary)),
            ),
          ),
        ),
        h('div', { className:'qa-row' },
          h('button', { className:'btn btn-ghost btn-sm', onClick:()=>window.open(snURL(task.number),'_blank') }, 'Open in SN'),
        ),
      );
    }),
  );
}

// ── Summary stats ────────────────────────────────────────────
function computeStats(tasks) {
  const counts = { wip:0, ns:0, hold:0, open:0, critical:0, notes:0 };
  tasks.forEach(t => {
    if (t.state === '2')  counts.wip++;
    if (t.state === '-5') counts.ns++;
    if (t.state === '11') counts.hold++;
    if (t.state === '1')  counts.open++;
    if (t.priority === '1' || t.priority === '2') counts.critical++;
    counts.notes += (t.notes || []).length;
  });
  return counts;
}

// ── Main App ─────────────────────────────────────────────────
function App() {
  const [activeTab, setActiveTab] = useState('tasks');
  const [search, setSearch]       = useState('');
  const [stateFilter, setStateFl] = useState('all');
  const [notionFilter, setNFl]    = useState(false);
  const [typeFilter, setTypeFl]   = useState(null);

  const stats = useMemo(() => computeStats(D.tasks), []);

  const filtered = useMemo(() => {
    return D.tasks.filter(t => {
      const stateMap = { wip:'2', ns:'-5', hold:'11', open:'1', series:'1' };
      if (stateFilter !== 'all' && t.state !== stateMap[stateFilter]) return false;
      if (notionFilter && (!t.notes || t.notes.length === 0)) return false;
      if (typeFilter && t.type !== typeFilter) return false;
      if (search) {
        const hay = (t.number + t.title + t.type + (t.workNote||'')).toLowerCase();
        if (!hay.includes(search.toLowerCase())) return false;
      }
      return true;
    });
  }, [search, stateFilter, notionFilter, typeFilter]);

  const wipTasks = useMemo(() => D.tasks.filter(t => t.state === '2'), []);

  // ── Render ─────────────────────────────────────────────────
  return h('div', { id:'app' },

    // Header
    h('header', { className:'header' },
      h('div', { className:'header-brand' },
        h('div', { className:'header-logo' }, 'ICE'),
        h('div', null,
          h('div', { className:'header-title' }, 'ICE Intelligence Center'),
          h('div', { className:'header-sub' }, 'Marco De Leonardis · AT&T Impact Squad · attsncoteam'),
        ),
      ),
      h('div', { className:'header-pills' },
        h('div', { className:'pill' }, h('span', { className:`pill-dot ${true ? 'pulse' : ''}` }), 'attsncoteam · Live'),
        h('div', { className:'pill' }, '238 Notion Notes'),
        h('div', { className:'pill' }, D.meta.pulled),
      ),
    ),

    // Summary strip
    h('div', { className:'summary-strip' },
      [
        { num: D.tasks.length, lbl:'Active Tasks',    color:'var(--green)' },
        { num: stats.wip,      lbl:'WIP',              color:'var(--sage)' },
        { num: stats.ns,       lbl:'Not Started',      color:'rgba(255,255,255,.7)' },
        { num: stats.hold,     lbl:'On Hold',          color:'var(--warn)' },
        { num: stats.open,     lbl:'Series / Open',    color:'var(--info)' },
        { num: stats.notes,    lbl:'Notion Refs',      color:'var(--notion)' },
        { num: stats.critical, lbl:'P1–P2 Critical',   color:' var(--error)' },
      ].map(s => h('div', { key:s.lbl, className:'sum-card' },
        h('div', { className:'sum-num', style:{ color:s.color } }, s.num),
        h('div', { className:'sum-lbl' }, s.lbl),
      )),
    ),

    // Tabs
    h('div', { className:'tabs', role:'tablist' },
      [
        { id:'tasks',        label:'All Tasks',            count: D.tasks.length },
        { id:'wip',          label:'WIP',                  count: wipTasks.length },
        { id:'intelligence', label:'Intelligence Briefings', count: D.briefings.length },
        { id:'enh',          label:'ENH / BT1',            count: D.tasks.filter(t=>t.type==='ENH Request').length },
      ].map(tab =>
        h('button', {
          key:tab.id,
          className:`tab-btn${activeTab===tab.id?' active':''}`,
          onClick:() => setActiveTab(tab.id),
        },
          tab.label,
          h('span', { className:'tab-badge' }, tab.count),
        ),
      ),
    ),

    // Main content
    h('main', null,

      // ── All Tasks ────────────────────────────────────────────
      activeTab === 'tasks' && h('div', null,
        h('div', { className:'filter-bar' },
          h('input', {
            className:'search-input', type:'text', placeholder:'Search tasks, numbers, keywords…',
            value:search, onChange:e=>setSearch(e.target.value),
          }),
          // State filters
          ['all','wip','ns','hold','open'].map(s =>
            h('button', {
              key:s,
              className:`fbtn${stateFilter===s?' active':''}`,
              onClick:() => { setStateFl(s); setTypeFl(null); },
            },
              s === 'all' ? 'All' : s === 'ns' ? 'Not Started' : s === 'hold' ? 'On Hold' : s.toUpperCase(),
            ),
          ),
          h('button', {
            className:`fbtn${typeFilter==='ENH Request'?' active':''}`,
            onClick:() => setTypeFl(typeFilter==='ENH Request' ? null : 'ENH Request'),
          }, 'ENH'),
          h('button', {
            className:`fbtn${notionFilter?' active':''}`,
            onClick:() => setNFl(!notionFilter),
          }, '📎 Has Notes'),
        ),
        h('div', { className:'section-sub' }, `Showing ${filtered.length} of ${D.tasks.length} tasks`),
        filtered.map(task => h(TaskCard, { key:task.number, task })),
        filtered.length === 0 && h('p', { style:{color:'var(--muted)',padding:'20px 0'} }, 'No tasks match current filters.'),
      ),

      // ── WIP ──────────────────────────────────────────────────
      activeTab === 'wip' && h('div', null,
        h('p', { className:'section-sub' }, `${wipTasks.length} tasks currently Work in Progress.`),
        wipTasks.map(task => h(TaskCard, { key:task.number, task })),
      ),

      // ── Intelligence ─────────────────────────────────────────
      activeTab === 'intelligence' && h('div', null,
        h('p', { className:'section-sub' }, `${D.briefings.length} high-signal intelligence briefings synthesized from the 238-note Notion scan. Each maps to active ICE tasks.`),
        D.briefings.map(b => h(IntelCard, { key:b.id, b })),
      ),

      // ── ENH ──────────────────────────────────────────────────
      activeTab === 'enh' && h(EnhTab, null),

    ), // /main
  ); // /app
}

// ── Mount ────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('app')).render(h(App));
</script>
</body>
</html>
